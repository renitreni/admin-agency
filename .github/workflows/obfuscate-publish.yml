name: Obfuscate and publish to main

on:
  push:
    branches:
      - clean-main

permissions:
  contents: write

concurrency:
  group: obfuscate-publish-main
  cancel-in-progress: true

jobs:
  obfuscate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clean-main
        uses: actions/checkout@v4
        with:
          ref: clean-main
          fetch-depth: 0
          path: source

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: none

      - name: Install YakPro-po and PHP-Parser
        working-directory: ${{ github.workspace }}
        run: |
          set -eu
          git clone --depth 1 https://github.com/pk-fr/yakpro-po.git yakpro-po
          # PHP-Parser 5.x ships on master (required by yakpro-po 3.x)
          git clone --depth 1 https://github.com/nikic/PHP-Parser.git yakpro-po/PHP-Parser
          chmod +x yakpro-po/yakpro-po.php
          php -v
          test -f yakpro-po/yakpro-po.php
          test -d yakpro-po/PHP-Parser/lib

      - name: Obfuscate Models, Filament Resources, and Blade views
        working-directory: ${{ github.workspace }}
        run: |
          # Intentionally avoid `pipefail`: `find | head` raises SIGPIPE (exit 141) on Ubuntu.
          set -eu

          WS="${GITHUB_WORKSPACE}"
          SOURCE_DIR="${WS}/source"
          YAKPRO="${WS}/yakpro-po/yakpro-po.php"
          CONFIG="${SOURCE_DIR}/yakpro-po.cnf"
          BLADE_SCRIPT="${SOURCE_DIR}/bin/obfuscate-blade.php"
          OUT_DIR="${WS}/obfuscate-out"
          MODELS_SRC="${SOURCE_DIR}/app/Models"
          RESOURCES_SRC="${SOURCE_DIR}/app/Filament/Resources"
          VIEWS_SRC="${SOURCE_DIR}/resources/views"
          MODELS_OUT="${OUT_DIR}/models/yakpro-po/obfuscated"
          RESOURCES_OUT="${OUT_DIR}/resources/yakpro-po/obfuscated"
          VIEWS_OUT="${OUT_DIR}/views"

          SOURCE_SHA="$(git -C "${SOURCE_DIR}" rev-parse --short HEAD)"
          echo "SOURCE_SHA=${SOURCE_SHA}" >> "$GITHUB_ENV"
          echo "Workspace=${WS}"
          echo "Config=${CONFIG}"

          test -f "${YAKPRO}"
          test -f "${CONFIG}"
          test -f "${BLADE_SCRIPT}"
          test -d "${MODELS_SRC}"
          test -d "${RESOURCES_SRC}"
          test -d "${VIEWS_SRC}"

          mkdir -p "${OUT_DIR}"

          obfuscate_php_dir() {
            local src="$1"
            local out="$2"
            local label="$3"

            echo "=== Obfuscating ${label}: ${src} ==="
            set +e
            php "${YAKPRO}" \
              --config-file "${CONFIG}" \
              -y \
              "${src}" \
              -o "${out}"
            local exit_code=$?
            set -e

            if [ "${exit_code}" -ne 0 ]; then
              echo "YakPro-po failed for ${label} with exit code ${exit_code}" >&2
              ls -la "${out}" || true
              exit "${exit_code}"
            fi

            local obfuscated="${out}/yakpro-po/obfuscated"
            if [ ! -d "${obfuscated}" ]; then
              echo "Expected obfuscated output at ${obfuscated}" >&2
              ls -la "${out}" || true
              ls -la "${out}/yakpro-po" || true
              exit 1
            fi

            local php_count
            php_count="$(find "${obfuscated}" -type f -name '*.php' | wc -l | tr -d ' ')"
            echo "Obfuscated PHP files (${label}): ${php_count}"
            if [ "${php_count}" -lt 1 ]; then
              echo "No obfuscated PHP files produced for ${label}" >&2
              exit 1
            fi
          }

          obfuscate_php_dir "${MODELS_SRC}" "${OUT_DIR}/models" "Models"
          obfuscate_php_dir "${RESOURCES_SRC}" "${OUT_DIR}/resources" "Filament Resources"

          echo "=== Obfuscating Blade views: ${VIEWS_SRC} ==="
          php "${BLADE_SCRIPT}" "${VIEWS_SRC}" "${VIEWS_OUT}"

          blade_count="$(find "${VIEWS_OUT}" -type f -name '*.blade.php' | wc -l | tr -d ' ')"
          echo "Obfuscated Blade files: ${blade_count}"
          if [ "${blade_count}" -lt 1 ]; then
            echo "No obfuscated Blade files produced" >&2
            exit 1
          fi

          echo "MODELS_OUT=${MODELS_OUT}" >> "$GITHUB_ENV"
          echo "RESOURCES_OUT=${RESOURCES_OUT}" >> "$GITHUB_ENV"
          echo "VIEWS_OUT=${VIEWS_OUT}" >> "$GITHUB_ENV"

      - name: Publish obfuscated tree to main
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          WS="${GITHUB_WORKSPACE}"
          SOURCE_DIR="${WS}/source"
          PUBLISH_DIR="${WS}/publish"
          MODELS_OUT="${WS}/obfuscate-out/models/yakpro-po/obfuscated"
          RESOURCES_OUT="${WS}/obfuscate-out/resources/yakpro-po/obfuscated"
          VIEWS_OUT="${WS}/obfuscate-out/views"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 --branch main \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "${PUBLISH_DIR}"

          # Sync publish tree to clean-main contents (readable app + views as baseline)
          rsync -a --delete \
            --exclude '.git' \
            "${SOURCE_DIR}/" "${PUBLISH_DIR}/"

          # Overlay obfuscated Models, Filament Resources, and Blade views only.
          # All other app/ PHP (Providers, Services, Http, Pages, etc.) stays readable.
          rsync -a --delete "${MODELS_OUT}/" "${PUBLISH_DIR}/app/Models/"
          rsync -a --delete "${RESOURCES_OUT}/" "${PUBLISH_DIR}/app/Filament/Resources/"
          rsync -a --delete "${VIEWS_OUT}/" "${PUBLISH_DIR}/resources/views/"

          cd "${PUBLISH_DIR}"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish on main."
            exit 0
          fi

          git commit -m "chore: publish obfuscated models/resources/views from clean-main (${SOURCE_SHA})"
          git push --force-with-lease origin HEAD:main
